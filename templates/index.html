<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detector 🌿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1f0f;
            color: #e0f0e0;
            min-height: 100vh;
        }
        header {
            background: #1a3a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #2d6a2d;
        }
        header h1 { color: #4caf50; font-size: 2rem; }
        header p { color: #a5d6a7; margin-top: 5px; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .upload-box {
            background: #1a3a1a;
            border: 2px dashed #4caf50;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover { background: #1f4a1f; border-color: #81c784; }
        .upload-box input { display: none; }
        .upload-box label {
            cursor: pointer;
            font-size: 1.1rem;
            color: #a5d6a7;
        }
        .upload-box .icon { font-size: 3rem; margin-bottom: 10px; }
        #preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 12px;
            margin: 20px auto;
            display: none;
            border: 2px solid #4caf50;
        }
        .btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
            display: block;
            margin: 20px auto 0;
        }
        .btn:hover { background: #388e3c; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #81c784;
            font-size: 1.1rem;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #2d6a2d;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #results { display: none; margin-top: 30px; }
        .result-card {
            background: #1a3a1a;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #2d6a2d;
        }
        .result-card h2 { color: #4caf50; margin-bottom: 20px; font-size: 1.3rem; }
        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .prediction-item .name { flex: 1; color: #e0f0e0; font-size: 0.95rem; }
        .bar-wrap { flex: 2; background: #0f1f0f; border-radius: 20px; height: 12px; margin: 0 12px; }
        .bar { height: 12px; border-radius: 20px; background: #4caf50; transition: width 1s; }
        .bar.second { background: #81c784; }
        .bar.third { background: #a5d6a7; }
        .confidence { color: #81c784; font-weight: bold; min-width: 55px; text-align: right; }
        .images-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .image-box { text-align: center; }
        .image-box p { color: #a5d6a7; margin-bottom: 8px; font-size: 0.9rem; }
        .image-box img {
            width: 250px; height: 250px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #2d6a2d;
        }
        .info-box {
            background: #0f2f0f;
            border-left: 4px solid #4caf50;
            padding: 16px 20px;
            border-radius: 8px;
            margin-top: 10px;
            color: #c8e6c9;
            line-height: 1.6;
        }
        .top-prediction {
            font-size: 1.4rem;
            font-weight: bold;
            color: #4caf50;
            text-align: center;
            margin-bottom: 8px;
        }
        .top-confidence {
            text-align: center;
            color: #a5d6a7;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌿 Plant Disease Detector</h1>
        <p>Upload a leaf image to detect diseases using AI</p>
    </header>

    <div class="container">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="icon">📸</div>
            <label>Click to upload a leaf image</label>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        </div>

        <img id="preview" src="" alt="Preview">

        <button class="btn" id="predictBtn" onclick="predict()" disabled>
            🔍 Detect Disease
        </button>

        <div id="loading">
            <div class="spinner"></div>
            Analyzing your plant...
        </div>

        <div id="results">
            <div class="result-card">
                <h2>🔬 Detection Result</h2>
                <div class="top-prediction" id="topPrediction"></div>
                <div class="top-confidence" id="topConfidence"></div>

                <h2>📊 Top 3 Predictions</h2>
                <div id="predictionBars"></div>
            </div>

            <div class="result-card">
                <h2>🔥 Grad-CAM Heatmap</h2>
                <div class="images-row">
                    <div class="image-box">
                        <p>Original Image</p>
                        <img id="originalImg" src="" alt="Original">
                    </div>
                    <div class="image-box">
                        <p>Model Focus Area</p>
                        <img id="gradcamImg" src="" alt="Grad-CAM">
                    </div>
                </div>
            </div>

            <div class="result-card">
                <h2>💊 Treatment Advice</h2>
                <div class="info-box" id="diseaseInfo"></div>
            </div>
        </div>
    </div>

    <script>
        let uploadedFile = null;

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            uploadedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                const preview = document.getElementById('preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('originalImg').src = e.target.result;
                document.getElementById('predictBtn').disabled = false;
                document.getElementById('results').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        async function predict() {
            if (!uploadedFile) return;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('predictBtn').disabled = true;

            const formData = new FormData();
            formData.append('file', uploadedFile);

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();

                document.getElementById('topPrediction').textContent = data.predictions[0].class;
                document.getElementById('topConfidence').textContent = `Confidence: ${data.predictions[0].confidence}%`;

                const bars = document.getElementById('predictionBars');
                bars.innerHTML = '';
                const barClasses = ['', 'second', 'third'];
                data.predictions.forEach((p, i) => {
                    bars.innerHTML += `
                        <div class="prediction-item">
                            <span class="name">${p.class}</span>
                            <div class="bar-wrap">
                                <div class="bar ${barClasses[i]}" style="width:${p.confidence}%"></div>
                            </div>
                            <span class="confidence">${p.confidence}%</span>
                        </div>`;
                });

                document.getElementById('gradcamImg').src = 'data:image/jpeg;base64,' + data.gradcam;
                document.getElementById('diseaseInfo').textContent = data.disease_info;
                document.getElementById('results').style.display = 'block';
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('predictBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
